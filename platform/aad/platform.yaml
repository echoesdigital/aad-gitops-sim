# Source: aad-platform/templates/api-bff-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aad-platform-api-bff
  namespace: aad-platform
  labels:
    helm.sh/chart: aad-platform-0.2.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: aad-platform
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: api-bff
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-bff
      app.kubernetes.io/instance: aad-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-bff
        app.kubernetes.io/instance: aad-platform
        app.kubernetes.io/component: api-bff
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: api-bff
          image: ghcr.io/echoesdigital/aad/api-bff:0.3.3
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # O BFF lê DownstreamApis:{Models,Environments,Governance} (HttpClientBuilder.cs).
            # Era Services__*Api (chave errada) → base address null → 500 (AAD-167 classe).
            - name: DownstreamApis__Models
              value: "http://aad-platform-api-models"
            - name: DownstreamApis__Environments
              value: "http://aad-platform-api-environments"
            - name: DownstreamApis__Governance
              value: "http://aad-platform-api-governance"
          envFrom:
            - configMapRef:
                name: aad-platform-config
            - secretRef:
                name: aad-platform-secret
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
