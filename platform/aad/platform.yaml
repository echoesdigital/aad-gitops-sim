# Source: aad-platform/templates/gitops-reconcile-rbac.yaml
# RBAC do reconcile GitOps (ADR-062): identidade que lê o status das Argo Application e dos recursos
# do namespace do ambiente (Deployments/Services prontos, IP do LoadBalancer) pra promover o env
# Provisioning→Ready. Read-only nos recursos do ambiente; nas Applications inclui `patch` (AAD-364)
# pra anotar argocd.argoproj.io/refresh=hard após o push — só vale quando o AAD/agent alcança o Argo
# por esta SA in-cluster. No piloto o agente usa kubeconfig do Vault, então o patch depende do RBAC
# da identidade DESSE kubeconfig no cluster do Argo, não desta SA.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aad-gitops-reconcile
  namespace: aad-platform
  labels:
    helm.sh/chart: aad-platform-0.2.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: aad-platform
    app.kubernetes.io/version: "1.0.0"
---
# Source: aad-platform/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: aad-platform-config
  namespace: aad-platform
  labels:
    helm.sh/chart: aad-platform-0.2.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: aad-platform
    app.kubernetes.io/version: "1.0.0"
data:
  ASPNETCORE_ENVIRONMENT: "Development"
  ASPNETCORE_URLS: "http://+:8080"
  Keycloak__Authority: ""
  # M2M (client_credentials): ServiceAccountTokenProvider lê este ClientId pra pegar token de
  # serviço (Environments→Models /with-secrets). O ClientSecret correspondente vai no Secret.
  Keycloak__ServiceAccount__ClientId: "aad-service-account"
  # AAD-399: espelhar usuarios do Keycloak no admin exige o modo Real; Stub devolve usuarios "stub-*".
  # O client aad-keycloak-admin (confidencial + service account com realm-management) vive no
  # ConfigMap aad-keycloak-realm (import do Keycloak). ClientSecret aqui e o mesmo do realm (sim/dev).
  Keycloak__KeycloakAdmin__Mode: "Real"
  Keycloak__KeycloakAdmin__ClientId: "aad-keycloak-admin"
  Keycloak__KeycloakAdmin__ClientSecret: "keycloak-admin-secret"
  Vault__Address: ""
  Temporal__Host: ""
  Kafka__BootstrapServers: ""
  Redis__ConnectionString: ""
  Dns__ZoneName: ""
  Dns__ResourceGroup: ""
  # Toggles explícitos (modo seguro: devBypass=false, vault.useStub=false, Production).
  Vault__UseInMemoryStub: "true"
  Aad__Auth__DevBypass: "false"
  Aad__Outbox__Enabled: "false"
  # URLs downstream — a Environments API chama a Models pra resolver componentes/perfis
  # antes de iniciar o workflow (Program.cs lê DownstreamApis:Models). BFF idem.
  DownstreamApis__Models: "http://aad-platform-api-models"
  DownstreamApis__Environments: "http://aad-platform-api-environments"
  DownstreamApis__Governance: "http://aad-platform-api-governance"
---
# Source: aad-platform/templates/gitops-reconcile-rbac.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aad-platform-gitops-reconcile
  labels:
    helm.sh/chart: aad-platform-0.2.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: aad-platform
    app.kubernetes.io/version: "1.0.0"
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: [""]
    resources: ["namespaces", "pods", "services", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
---
