---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flavio-web
  labels:
    app.kubernetes.io/name: flavio-web
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: env-flavio2-mqzoydga
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flavio-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flavio-web
        app.kubernetes.io/component: app
        app.kubernetes.io/part-of: env-flavio2-mqzoydga
    spec:
      containers:
        - name: flavio-web
          image: flavio-web:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
