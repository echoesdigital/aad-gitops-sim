---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  labels:
    app.kubernetes.io/name: portal
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: portal-banco-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portal
        app.kubernetes.io/component: app
        app.kubernetes.io/part-of: portal-banco-prod
    spec:
      containers:
        - name: portal
          image: portal:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9898
          env:
            - name: PODINFO_CACHE_SERVER
              value: "tcp://redis:6379"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
