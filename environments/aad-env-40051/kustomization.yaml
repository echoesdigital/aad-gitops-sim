---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aad-gitopsenv-40051

resources:
  - namespace.yaml
  - base

labels:
  - includeSelectors: false
    pairs:
      environment: "dev"
      managed-by: "aad"

images:
  - name: web-demo
    newName: nginx
    newTag: "1-alpine"

replicas:
  - name: web-demo
    count: 1
