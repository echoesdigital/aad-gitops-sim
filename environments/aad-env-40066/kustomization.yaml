---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aad-gitopsenv-40066

resources:
  - namespace.yaml
  - base
  - vault-auth.yaml
  - vault-secret-postgres.yaml

labels:
  - includeSelectors: false
    pairs:
      environment: "dev"
      managed-by: "aad"

images:
  - name: postgres
    newName: postgres
    newTag: "16"

replicas:
  - name: postgres
    count: 1
