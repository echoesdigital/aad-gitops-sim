---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  labels:
    app.kubernetes.io/name: portal
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: gate-managed
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portal
        app.kubernetes.io/component: app
        app.kubernetes.io/part-of: gate-managed
    spec:
      containers:
        - name: portal
          image: portal:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9898
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
