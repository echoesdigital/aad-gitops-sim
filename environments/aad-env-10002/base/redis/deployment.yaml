---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: gate-managed
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/component: app
        app.kubernetes.io/part-of: gate-managed
    spec:
      containers:
        - name: redis
          image: redis:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6379
          env:
            - name: CONNECTION_STRING
              value: ""
            - name: HOST_INTERNO
              value: ""
            - name: PORTA_INTERNA
              value: "6379"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
