---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aad-gitopsenv-40046

resources:
  - namespace.yaml
  - base

labels:
  - includeSelectors: false
    pairs:
      environment: "dev"
      managed-by: "aad"

images:
  - name: kafka
    newName: apache/kafka
    newTag: "3.7.0"
  - name: kafka-ui
    newName: provectuslabs/kafka-ui
    newTag: "latest"
  - name: pgadmin
    newName: dpage/pgadmin4
    newTag: "8"
  - name: postgres
    newName: postgres
    newTag: "16"

replicas:
  - name: kafka
    count: 1
  - name: kafka-ui
    count: 1
  - name: pgadmin
    count: 1
  - name: postgres
    count: 1
