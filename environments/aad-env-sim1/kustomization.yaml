---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aad-env-sim1

resources:
  - namespace.yaml
  - base

labels:
  - includeSelectors: false
    pairs:
      environment: dev
      managed-by: aad

images:
  - name: web
    newName: ghcr.io/stefanprodan/podinfo
    newTag: 6.7.1

replicas:
  - name: web
    count: 1
