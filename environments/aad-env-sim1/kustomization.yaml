---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aad-env-sim1

resources:
  - namespace.yaml
  - base

labels:
  - includeSelectors: false
    pairs:
      environment: dev
      managed-by: aad

images:
  - name: web
    newName: nginxinc/nginx-unprivileged
    newTag: 1.27-alpine

replicas:
  - name: web
    count: 1
