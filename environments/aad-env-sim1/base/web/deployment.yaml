---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
        app.kubernetes.io/component: app
        app.kubernetes.io/part-of: nginx
    spec:
      containers:
        - name: web
          image: web:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: vol-var-cache-nginx
              mountPath: /var/cache/nginx
            - name: vol-var-run
              mountPath: /var/run
            - name: vol-tmp
              mountPath: /tmp
      volumes:
        - name: vol-var-cache-nginx
          emptyDir: {}
        - name: vol-var-run
          emptyDir: {}
        - name: vol-tmp
          emptyDir: {}
