---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flavio-foo
  labels:
    app.kubernetes.io/name: flavio-foo
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: env-flavio-foo-mr00r8nv
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flavio-foo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flavio-foo
        app.kubernetes.io/component: app
        app.kubernetes.io/part-of: env-flavio-foo-mr00r8nv
    spec:
      containers:
        - name: flavio-foo
          image: flavio-foo:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
