---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  labels:
    app.kubernetes.io/name: db
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: env-postgres-restore-demo-15377-mrxjw67a
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db
        app.kubernetes.io/component: app
        app.kubernetes.io/part-of: env-postgres-restore-demo-15377-mrxjw67a
    spec:
      initContainers:
        - name: aad-restore
          image: curlimages/curl:8.10.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - "curl -fsSL -o '/docker-entrypoint-initdb.d/demo.sql' \"$RESTORE_SOURCE_URL\""
          envFrom:
            - secretRef:
                name: db-secrets
                optional: true
          volumeMounts:
            - name: aad-restore-data
              mountPath: /docker-entrypoint-initdb.d
      containers:
        - name: db
          image: db:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5432
          env:
            - name: POSTGRES_HOST_AUTH_METHOD
              value: "trust"
          envFrom:
            - secretRef:
                name: db-secrets
                optional: true
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: aad-restore-data
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: aad-restore-data
          emptyDir: {}
