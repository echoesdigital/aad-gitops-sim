---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  labels:
    app.kubernetes.io/name: portal
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: e2e-green
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portal
        app.kubernetes.io/component: app
        app.kubernetes.io/part-of: e2e-green
    spec:
      containers:
        - name: portal
          image: portal:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9898
          env:
            - name: REDIS_ADDR
              value: "redis:6379"
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
